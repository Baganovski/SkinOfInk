  <style>
    :root {
      --bg: #ffffff;
      --text: #0d0d0d;
      --card: #0d0d0d;
      --card-text: #ffffff;
      --muted: #6a6a6a;
      --line: #e4e4e4;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 56px 20px 80px;
      line-height: 1.4;
    }

    .wrap {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---------- Back link ---------- */
    .back {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: .5px;
      margin-bottom: 24px;
      transition: color .15s ease;
    }
    .back:hover { color: var(--text); }
    .back svg { width: 16px; height: 16px; }

    /* ---------- Logo ---------- */
    .avatar {
      width: 100%;
      max-width: 380px;
      height: auto;
      object-fit: contain;
      margin-bottom: 14px;
    }
    .logo {
      font-family: 'Anton', sans-serif;
      font-size: clamp(54px, 14vw, 92px);
      letter-spacing: -1px;
      line-height: 0.9;
      text-transform: uppercase;
      position: relative;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--text);
      font-weight: 600;
      font-size: 15.5px;
      text-align: center;
      margin-bottom: 5px;
    }
    .bio {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }

    /* ---------- Links ---------- */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 17px 22px;
      background: var(--card);
      color: var(--card-text);
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: 15.5px;
      letter-spacing: .3px;
      border: 2px solid var(--card);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, color .15s ease;
      position: relative;
    }
    .link .ico {
      width: 22px;
      flex: 0 0 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .link .label { flex: 1; text-align: center; }
    .link .ico svg { width: 20px; height: 20px; }

    .link:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }
    /* outline variant for secondary links */
    .link.outline {
      background: transparent;
      color: var(--text);
      border-color: #cfcfcf;
    }
    .link.outline:hover {
      background: var(--card);
      color: var(--card-text);
      border-color: var(--card);
    }

    /* ---------- Socials ---------- */
    .socials {
      display: flex;
      gap: 22px;
      margin-top: 38px;
    }
    .socials a {
      color: var(--muted);
      transition: color .15s ease, transform .15s ease;
      display: inline-flex;
    }
    .socials a:hover { color: var(--text); transform: translateY(-2px); }
    .socials svg { width: 24px; height: 24px; }

    footer {
      margin-top: 40px;
      color: #9a9a9a;
      font-size: 12px;
      letter-spacing: 1px;
      text-align: center;
    }
    footer a { color: #6a6a6a; text-decoration: none; }

    /* ---------- Mobile ---------- */
    @media (max-width: 600px) {
      body { padding: 40px 16px 64px; }
      .link { padding: 16px 18px; font-size: 15px; }
      .socials { gap: 20px; }
    }
  </style>
</head>
